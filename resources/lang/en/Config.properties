setupLabel = Setup
debuggingLabel = Debugging

integrationModeLabel = Integration mode
integrationModeTooltip = Choose how Klaviyo is provided on the storefront: plugin injects the Klaviyo onsite script, GTM expects an external loader.
integrationModeGtm = Google Tag Manager (external)
integrationModePlugin = Plugin (inject onsite snippet)

publicApiKeyLabel = Klaviyo public API key (site ID)
publicApiKeyTooltip = Required when Integration mode is Plugin. Found in Klaviyo account settings for onsite tracking.

logPluginHeartbeatLabel = Log plugin heartbeat
logPluginHeartbeatTooltip = Enabled by default: logs a heartbeat info message on bootstrap indicating whether the Klaviyo public API key was detected and includes the key value when available.
logIdentifyEventDebugLabel = Enable debugging logs for "Identify" event
logIdentifyEventDebugTooltip = Optional event-level diagnostics for identify flow resolution attempts, trigger sources, successful identify calls, and dedupe skips.
logViewedProductEventDebugLabel = Enable debugging logs for "Viewed Product" event
logViewedProductEventDebugTooltip = Optional event-level diagnostics for "Viewed Product" page detection, payload resolution, dedupe, and track dispatch.
logAddedToCartEventDebugLabel = Enable debugging logs for "Added to Cart" event
logAddedToCartEventDebugTooltip = Optional event-level diagnostics for "Added to Cart" listener setup, intent/snapshot correlation, payload resolution, dedupe, and track dispatch.
eventsLabel = Events
enableViewedProductEventLabel = Enable "Viewed Product" event tracking
enableViewedProductEventTooltip = Enabled by default: tracks Klaviyo "Viewed Product" when a product detail page is detected.
enableAddedToCartEventLabel = Enable "Added to Cart" event tracking
enableAddedToCartEventTooltip = Enabled by default: tracks Klaviyo "Added to Cart" based on basket add intent + basket snapshot reconciliation.

enableViewedHomepageEventLabel = Enable "Viewed Homepage" event tracking
enableViewedHomepageEventTooltip = Enabled by default: tracks Klaviyo "Viewed Homepage" when Plenty runtime templateType resolves to "home".
enableViewedCategoryEventLabel = Enable "Viewed Category" event tracking
enableViewedCategoryEventTooltip = Enabled by default: tracks Klaviyo "Viewed Category" when Plenty runtime templateType resolves to "category".
enableViewedLegalPageEventLabel = Enable "Viewed Legal Page" event tracking
enableViewedLegalPageEventTooltip = Enabled by default: tracks Klaviyo "Viewed Legal Page" when Plenty runtime templateType matches the legal template allow-list.
enableViewedAccountPageEventLabel = Enable "Viewed Account Page" event tracking
enableViewedAccountPageEventTooltip = Enabled by default: tracks Klaviyo "Viewed Account Page" when Plenty runtime templateType resolves to "my-account".
enableStartedCheckoutEventLabel = Enable "Started Checkout" event tracking
enableStartedCheckoutEventTooltip = Enabled by default: tracks Klaviyo "Started Checkout" when Plenty runtime templateType resolves to "checkout" and basket line items are available.
logViewedHomepageEventDebugLabel = Enable debugging logs for "Viewed Homepage" event
logViewedHomepageEventDebugTooltip = Optional event-level diagnostics for "Viewed Homepage" page detection, payload resolution, dedupe, and track dispatch.
logViewedCategoryEventDebugLabel = Enable debugging logs for "Viewed Category" event
logViewedCategoryEventDebugTooltip = Optional event-level diagnostics for "Viewed Category" page detection, payload resolution, dedupe, and track dispatch.
logViewedLegalPageEventDebugLabel = Enable debugging logs for "Viewed Legal Page" event
logViewedLegalPageEventDebugTooltip = Optional event-level diagnostics for "Viewed Legal Page" page detection, legal template allow-list matching, dedupe, and track dispatch.
logViewedAccountPageEventDebugLabel = Enable debugging logs for "Viewed Account Page" event
logViewedAccountPageEventDebugTooltip = Optional event-level diagnostics for "Viewed Account Page" page detection, dedupe, and track dispatch.
logStartedCheckoutEventDebugLabel = Enable debugging logs for "Started Checkout" event
logStartedCheckoutEventDebugTooltip = Optional event-level diagnostics for "Started Checkout" page detection, basket payload resolution, dedupe, and track dispatch.
debugIdentifyEmailOverrideLabel = Debug identify email override
debugIdentifyEmailOverrideTooltip = Optional testing helper: when set to a valid email, the plugin skips runtime email discovery and forces identify using this configured address.
