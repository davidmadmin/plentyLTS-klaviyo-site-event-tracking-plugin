trackingLabel = Tracking
integrationModeLabel = Klaviyo JavaScript integration mode
integrationModeTooltip = Choose how Klaviyo JavaScript is loaded. Use Google Tag Manager mode if Klaviyo is loaded externally via GTM; use plugin mode if this plugin should load and control Klaviyo directly.
integrationModeGtm = Integrate via Google Tag Manager
integrationModePlugin = Provide Klaviyo JavaScript via this plugin
publicApiKeyLabel = Klaviyo public API key (site ID)
publicApiKeyTooltip = Required only in plugin mode. Leave empty in GTM mode when Klaviyo is loaded externally.
enableDebugLoggingLabel = Enable debug logging
enableDebugLoggingTooltip = Enables plugin-side console logs for Klaviyo tracking diagnostics. Keep disabled in production unless troubleshooting.
logIdentifyCallsLabel = Log identify calls
logIdentifyCallsTooltip = Optional fine-grained logging: log identify calls plus a per-page status report (identification/tracking with relevant Klaviyo status details) when debug logging is enabled.
logTrackCallsLabel = Log track calls
logTrackCallsTooltip = Optional fine-grained logging: log each klaviyo.track payload when debug logging is enabled.
logErrorsOnlyLabel = Log errors only
logErrorsOnlyTooltip = Optional fine-grained logging: when enabled, only tracking errors/warnings are logged (identify/track payload logs are suppressed).
