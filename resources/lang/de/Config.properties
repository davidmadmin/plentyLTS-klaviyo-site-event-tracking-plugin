trackingLabel = Tracking
integrationModeLabel = Klaviyo-JavaScript-Integrationsmodus
integrationModeTooltip = Wählen Sie, wie Klaviyo JavaScript geladen wird. Verwenden Sie den Google Tag Manager-Modus, wenn Klaviyo extern über GTM eingebunden wird; verwenden Sie den Plugin-Modus, wenn dieses Plugin Klaviyo direkt laden und steuern soll.
integrationModeGtm = Über Google Tag Manager integrieren
integrationModePlugin = Klaviyo JavaScript über dieses Plugin bereitstellen
publicApiKeyLabel = Öffentlicher Klaviyo-API-Schlüssel (Site-ID)
publicApiKeyTooltip = Nur im Plugin-Modus erforderlich. Im GTM-Modus leer lassen, wenn Klaviyo extern geladen wird.
enableDebugLoggingLabel = Debug-Logging aktivieren
enableDebugLoggingTooltip = Aktiviert pluginseitige Konsolenprotokolle zur Diagnose des Klaviyo-Trackings. In Produktion nur bei Bedarf zur Fehlersuche aktivieren.
logIdentifyCallsLabel = Identify-Aufrufe protokollieren
logIdentifyCallsTooltip = Optionale Feineinstellung: Protokolliert identify-Aufrufe und einen Statusbericht pro Seite (Identifizierung/Tracking inkl. relevanter Klaviyo-Statusinfos), wenn Debug-Logging aktiviert ist.
logTrackCallsLabel = Track-Aufrufe protokollieren
logTrackCallsTooltip = Optionale Feineinstellung: Protokolliert jedes klaviyo.track-Payload, wenn Debug-Logging aktiviert ist.
logErrorsOnlyLabel = Nur Fehler protokollieren
logErrorsOnlyTooltip = Optionale Feineinstellung: Wenn aktiviert, werden nur Tracking-Fehler/-Warnungen protokolliert (Identify-/Track-Payload-Logs werden unterdrückt).
