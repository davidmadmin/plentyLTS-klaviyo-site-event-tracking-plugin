setupLabel = Setup
debuggingLabel = Debugging
integrationModeLabel = Klaviyo-JavaScript-Integrationsmodus
integrationModeTooltip = Wählen Sie, wie Klaviyo JavaScript geladen wird. Verwenden Sie den Google Tag Manager-Modus, wenn Klaviyo extern über GTM eingebunden wird; verwenden Sie den Plugin-Modus, wenn dieses Plugin Klaviyo direkt laden und steuern soll.
integrationModeGtm = Über Google Tag Manager integrieren
integrationModePlugin = Klaviyo JavaScript über dieses Plugin bereitstellen
publicApiKeyLabel = Öffentlicher Klaviyo-API-Schlüssel (Site-ID)
publicApiKeyTooltip = Nur im Plugin-Modus erforderlich. Im GTM-Modus leer lassen, wenn Klaviyo extern geladen wird.
logPluginHeartbeatLabel = Plugin-Heartbeat protokollieren
logPluginHeartbeatTooltip = Standardmäßig aktiviert: protokolliert beim Bootstrap eine Heartbeat-Info, ob der öffentliche Klaviyo-API-Schlüssel erkannt wurde, und zeigt den Schlüsselwert an, wenn vorhanden.
logIdentifyEventDebugLabel = Debug-Logs für "Identify"-Event aktivieren
logIdentifyEventDebugTooltip = Optionale eventbezogene Diagnose für Identify-Ablauf, Trigger-Quellen, erfolgreiche Identify-Aufrufe und Dedup-Skips.
logViewedProductEventDebugLabel = Debug-Logs für "Viewed Product"-Event aktivieren
logViewedProductEventDebugTooltip = Optionale eventbezogene Diagnose für Seiten-Erkennung, Payload-Auflösung, Deduplizierung und Track-Dispatch von "Viewed Product".
logAddedToCartEventDebugLabel = Debug-Logs für "Added to Cart"-Event aktivieren
logAddedToCartEventDebugTooltip = Optionale eventbezogene Diagnose für Listener-Setup, Intent-/Snapshot-Korrelation, Payload-Auflösung, Deduplizierung und Track-Dispatch von "Added to Cart".
eventsLabel = Events
enableViewedProductEventLabel = "Viewed Product"-Event-Tracking aktivieren
enableViewedProductEventTooltip = Standardmäßig aktiviert: trackt Klaviyo "Viewed Product", wenn eine Produktdetailseite erkannt wird.
enableAddedToCartEventLabel = "Added to Cart"-Event-Tracking aktivieren
enableAddedToCartEventTooltip = Standardmäßig aktiviert: trackt Klaviyo "Added to Cart" auf Basis von Add-to-Basket-Intent und Basket-Snapshot-Abgleich.

enableViewedHomepageEventLabel = "Viewed Homepage"-Event-Tracking aktivieren
enableViewedHomepageEventTooltip = Standardmäßig aktiviert: trackt Klaviyo "Viewed Homepage", wenn Plenty `templateType` als "home" auflöst.
enableViewedCategoryEventLabel = "Viewed Category"-Event-Tracking aktivieren
enableViewedCategoryEventTooltip = Standardmäßig aktiviert: trackt Klaviyo "Viewed Category", wenn Plenty `templateType` als "category" auflöst.
enableViewedLegalPageEventLabel = "Viewed Legal Page"-Event-Tracking aktivieren
enableViewedLegalPageEventTooltip = Standardmäßig aktiviert: trackt Klaviyo "Viewed Legal Page", wenn Plenty `templateType` einem Legal-Allow-List-Wert entspricht.
enableViewedAccountPageEventLabel = "Viewed Account Page"-Event-Tracking aktivieren
enableViewedAccountPageEventTooltip = Standardmäßig aktiviert: trackt Klaviyo "Viewed Account Page", wenn Plenty `templateType` als "my-account" auflöst.
enableStartedCheckoutEventLabel = "Started Checkout"-Event-Tracking aktivieren
enableStartedCheckoutEventTooltip = Standardmäßig aktiviert: trackt Klaviyo "Started Checkout", wenn Plenty `templateType` als "checkout" auflöst und Basket-Positionen verfügbar sind.
logViewedHomepageEventDebugLabel = Debug-Logs für "Viewed Homepage"-Event aktivieren
logViewedHomepageEventDebugTooltip = Optionale eventbezogene Diagnose für Seiten-Erkennung, Payload-Auflösung, Deduplizierung und Track-Dispatch von "Viewed Homepage".
logViewedCategoryEventDebugLabel = Debug-Logs für "Viewed Category"-Event aktivieren
logViewedCategoryEventDebugTooltip = Optionale eventbezogene Diagnose für Seiten-Erkennung, Payload-Auflösung, Deduplizierung und Track-Dispatch von "Viewed Category".
logViewedLegalPageEventDebugLabel = Debug-Logs für "Viewed Legal Page"-Event aktivieren
logViewedLegalPageEventDebugTooltip = Optionale eventbezogene Diagnose für Seiten-Erkennung, Legal-Allow-List-Abgleich, Deduplizierung und Track-Dispatch von "Viewed Legal Page".
logViewedAccountPageEventDebugLabel = Debug-Logs für "Viewed Account Page"-Event aktivieren
logViewedAccountPageEventDebugTooltip = Optionale eventbezogene Diagnose für Seiten-Erkennung, Deduplizierung und Track-Dispatch von "Viewed Account Page".
logStartedCheckoutEventDebugLabel = Debug-Logs für "Started Checkout"-Event aktivieren
logStartedCheckoutEventDebugTooltip = Optionale eventbezogene Diagnose für Seiten-Erkennung, Basket-Payload-Auflösung, Deduplizierung und Track-Dispatch von "Started Checkout".
debugIdentifyEmailOverrideLabel = Debug-Override für Identify-E-Mail
debugIdentifyEmailOverrideTooltip = Optionale Testhilfe: Wenn eine gültige E-Mail gesetzt ist, überspringt das Plugin die Laufzeit-Ermittlung und erzwingt Identify mit dieser konfigurierten Adresse.
